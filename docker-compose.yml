services:
  gpt-image-panel:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: gpt-image-panel
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./images:/app/images
      - ./data:/app/data
    environment:
      - DEFAULT_API_URL=${DEFAULT_API_URL:-}
      - DEFAULT_API_KEY=${DEFAULT_API_KEY:-}
      - DEFAULT_API_PATH=${DEFAULT_API_PATH:-/v1/images/generations}
      - DEFAULT_RESPONSES_MODEL=${DEFAULT_RESPONSES_MODEL:-gpt-5.4}
      - ACCESS_KEY=${ACCESS_KEY:-}
      - ALLOW_UNAUTHENTICATED=${ALLOW_UNAUTHENTICATED:-false}
      - IP_ALLOWLIST=${IP_ALLOWLIST:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - MAX_FILE_SIZE_MB=50
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
